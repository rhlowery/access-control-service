# Default values for access-control-service library chart.
# This is a YAML-formatted file.

global:
  security:
    allowInsecureImages: true
  postgresql:
    host: "postgresql-rw"
    database: "access_control_db"
    username: "access_control_user"
    password: "user_password"
  oidc:
    authServerUrl: "http://idp.localtest.me/realms/access-control"

acs-backend:
  fullnameOverride: "acs-backend"
  enabled: true
  image:
    repository: rhlowery/acs-backend
    tag: "1.0.0-SNAPSHOT"
    pullPolicy: IfNotPresent
  # Override acs-backend values
  security:
    pemKeysEnabled: true
    publicKeyBase64: ""
    privateKeyBase64: ""
  appConfig:
    databricksUrl: "http://unity-catalog-server:8080"
    otelEndpoint: "http://otel-collector:4317"
    environment: "dev"
  # Use file: protocol for key locations to avoid MalformedURLException
  env:
    SMALLRYE_JWT_SIGN_KEY_LOCATION: "file:/deployments/keys/privateKey.pem"
    MP_JWT_VERIFY_PUBLICKEY_LOCATION: "file:/deployments/keys/publicKey.pem"
  readinessProbe:
    initialDelaySeconds: 60
    periodSeconds: 10
  livenessProbe:
    initialDelaySeconds: 90
    periodSeconds: 20
  service:
    type: ClusterIP
    nodePort: null
  ingress:
    enabled: true
    className: "nginx"
    annotations:
      cert-manager.io/cluster-issuer: "selfsigned-issuer"
    hosts:
      - host: api.localtest.me
        paths:
          - path: /
            pathType: Prefix
    tls:
      - secretName: api-sslip-tls
        hosts:
          - api.localtest.me
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  oidc:
    authServerUrl: "http://idp.localtest.me/realms/access-control"
    clientSecret: "REPLACE_ME_SECRET"
  postgresql:
    host: "postgresql-rw"
    database: "access_control_db"
    username: "access_control_user"
    password: "user_password"

acs-ui:
  fullnameOverride: "acs-ui"
  enabled: true
  config:
    apiUrl: "http://api.localtest.me"
  image:
    repository: rhlowery/acs-ui
    tag: "1.0.0-SNAPSHOT"
    pullPolicy: IfNotPresent
  # Link to the acs-backend service using the ingress hostname
  ingress:
    enabled: true
    className: "nginx"
    annotations:
      cert-manager.io/cluster-issuer: "selfsigned-issuer"
    hosts:
      - host: acs.localtest.me
        paths:
          - path: /
            pathType: Prefix
    tls:
      - secretName: acs-sslip-tls
        hosts:
          - acs.localtest.me
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

ingress-nginx:
  enabled: false
  controller:
    replicaCount: 1
    admissionWebhooks:
      enabled: false

keycloak:
  enabled: true
  image:
    repository: quay.io/keycloak/keycloak
    tag: 25.0.1
    pullPolicy: IfNotPresent
  adminUser: admin
  adminPassword: admin
  db:
    vendor: postgres
    host: postgresql-rw
    username: access_control_user
    password: user_password
    database: access_control_db
  ingress:
    enabled: true
    className: "nginx"
    host: idp.localtest.me
    tls:
      enabled: false
      secretName: keycloak-tls
  resources:
    limits:
      cpu: 500m
      memory: 1024Mi
    requests:
      cpu: 100m
      memory: 512Mi
  containerSecurityContext:
    enabled: true
    readOnlyRootFilesystem: false
    runAsUser: 1000
    runAsGroup: 0
  podSecurityContext:
    enabled: true
    fsGroup: 1000
  defaultInitContainers:
    prepareWriteDirs:
      enabled: false

postgresql:
  enabled: true
  clusterName: "postgresql"
  instances: 1
  imageName: "ghcr.io/cloudnative-pg/postgresql:16"
  auth:
    database: "access_control_db"
    username: "access_control_user"
    password: "user_password"
    secretName: "postgresql-app-user"
  storage:
    size: "1Gi"
  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: 1
      memory: 1Gi

gravitino:
  fullnameOverride: "gravitino"
  enabled: true
  mysql:
    enabled: false
  postgresql:
    enabled: false
  image:
    registry: docker.io
    repository: apache/gravitino
    tag: "latest"
  oidc:
    enabled: true
    issuerUrl: "http://idp.localtest.me/realms/access-control"
    clientId: "gravitino"
    secretId: "gravitino-secret"
  database:
    host: "postgresql-rw"
    port: 5432
    database: "access_control_db"
    user: "access_control_user"
    password: "user_password"
  storage:
    type: "s3"
    s3:
      endpoint: "http://minio:9000"
      bucket: "gravitino-warehouse"
      accessKey: "minioadmin"
      secretKey: "minioadmin"
  ingress:
    enabled: true
    className: "nginx"
    hosts:
      - host: gravitino.localtest.me
        paths:
          - path: /
            pathType: Prefix
  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: 1
      memory: 1Gi

polaris:
  enabled: true
  auth:
    type: "oidc"
    oidcIssuerUrl: "http://idp.localtest.me/realms/access-control"
  fullnameOverride: "polaris"
  database:
    url: "jdbc:postgresql://postgresql-rw:5432/access_control_db"
    username: "access_control_user"
    password: "user_password"
  ingress:
    enabled: true
    className: "nginx"
    hosts:
      - host: polaris.localtest.me
        paths:
          - path: /
            pathType: Prefix
  extraEnvVars:
    - name: POLARIS_AUTHENTICATOR_TYPE
      value: "oidc"
    - name: POLARIS_OIDC_ISSUER_URL
      value: "http://idp.localtest.me/realms/access-control"
  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: 500m
      memory: 1Gi

unity-catalog:
  enabled: true
  fullnameOverride: "unity-catalog"
  postgresql:
    enabled: false
  auth:
    enabled: true
    provider: "other"
    authorizationUrl: "http://idp.localtest.me/realms/access-control/protocol/openid-connect/auth"
    tokenUrl: "http://idp.localtest.me/realms/access-control/protocol/openid-connect/token"
    clientSecret: "unity-catalog-secret"
    clientSecretName: "unity-catalog-oidc-secret"
  server:
    deployment:
      resources:
        requests:
          cpu: 200m
          memory: 512Mi
        limits:
          cpu: 500m
          memory: 1Gi
    db:
      type: "postgresql"
      postgresqlConfig:
        host: "postgresql-rw"
        dbName: "access_control_db"
        username: "access_control_user"
        passwordSecretName: "postgresql-app-user"
        passwordSecretKey: "password"
  storage:
    type: "s3"
    s3:
      endpoint: "http://minio:9000"
      bucket: "unity-catalog"
      accessKey: "minioadmin"
      secretKey: "minioadmin"
  ingress:
    enabled: true
    ingressClassName: "nginx"
    host: unity.localtest.me

hive-metastore:
  enabled: true
  fullnameOverride: "hive-metastore"
  postgresql:
    enabled: false
    fullnameOverride: "hive-metastore-postgresql"
    image:
      registry: docker.io
      repository: ghcr.io/cloudnative-pg/postgresql #bitnami/postgresql
      tag: 16 #latest
    auth:
      username: hive
      password: hive
      database: metastore
  auth:
    oidc:
      enabled: true
      issuerUrl: "http://idp.localtest.me/realms/access-control"
      clientId: "hive-metastore"
  connections:
    database:
      type: "postgres"
      host: "postgresql-rw"
      database: "access_control_db"
      username: "access_control_user"
      password: "user_password"
  storage:
    type: "s3"
    s3:
      endpoint: "http://minio:9000"
      bucket: "hive-warehouse"
      accessKey: "minioadmin"
      secretKey: "minioadmin"
  ingress:
    enabled: true
    className: "nginx"
    hosts:
      - host: hive.localtest.me
        paths:
          - path: /
            pathType: Prefix
  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: 500m
      memory: 1Gi

minio:
  enabled: true
  fullnameOverride: "minio"
  mode: standalone
  replicas: 1
  persistence:
    enabled: false
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi
  auth:
    rootUser: minioadmin
    rootPassword: minioadmin
  oidc:
    enabled: true
    configUrl: "http://keycloak/realms/access-control/.well-known/openid-configuration"
    clientId: "minio"
    clientSecret: "minio-secret"
    claimName: "policy"
    scopes: "openid,profile,email"
    redirectUri: "http://console.s3.localtest.me/oauth_callback"
    displayName: "Keycloak"
  # Configuration for local object storage
  defaultBuckets: "access-control, hive-warehouse, gravitino-warehouse, unity-catalog"
  ingress:
    enabled: true
    ingressClassName: "nginx"
    hosts:
      - s3.localtest.me
  consoleIngress:
    enabled: true
    ingressClassName: "nginx"
    path: /
    hosts:
      - "console.s3.localtest.me"
  consoleService:
    type: ClusterIP
    port: 9001

cert-manager:
  enabled: false
  installCRDs: true
  # Uncomment below to setup a default cluster issuer for self-signed certificates
  clusterIssuer:
    enabled: true
    name: "selfsigned-issuer"

prometheus:
  enabled: true
  fullnameOverride: "prometheus"
  alertmanager:
    enabled: false
  prometheus-node-exporter:
    enabled: false
  prometheus-pushgateway:
    enabled: false
  server:
    fullnameOverride: "prometheus-server"
    persistentVolume:
      enabled: false
    # Enable remote write for Otel collector
    extraArgs:
      web.enable-remote-write-receiver: null

opentelemetry-collector:
  enabled: true
  fullnameOverride: "otel-collector"
  image:
    repository: otel/opentelemetry-collector-contrib
    tag: 0.113.0
  mode: deployment
  config:
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318
    exporters:
      prometheusremotewrite:
        endpoint: "http://prometheus-server/api/v1/write"
        resource_to_telemetry_conversion:
          enabled: true
    service:
      pipelines:
        metrics:
          receivers: [otlp]
          exporters: [prometheusremotewrite]
