apiVersion: batch/v1
kind: Job
metadata:
  name: infra-patch
  namespace: {{ .Release.Namespace }}
spec:
  template:
    spec:
      serviceAccountName: infra-patch-sa
      containers:
        - name: patch
          image: alpine/k8s:1.29.2
          command:
            - /bin/bash
            - -c
            - |
              IP=$(kubectl get svc keycloak -n {{ .Release.Namespace }} -o jsonpath='{.spec.clusterIP}')
              echo "Patching Minio with hostAlias for idp.localtest.me and wait-for-keycloak init container..."
              kubectl patch deployment minio -n {{ .Release.Namespace }} --patch "{\"spec\": {\"template\": {\"spec\": {\"hostAliases\": [{\"ip\": \"$IP\", \"hostnames\": [\"idp.localtest.me\"]}], \"initContainers\": [{\"name\": \"wait-for-keycloak\", \"image\": \"curlimages/curl:latest\", \"command\": [\"/bin/sh\", \"-c\", \"until curl -s http://keycloak/realms/access-control/.well-known/openid-configuration | grep -q issuer; do echo waiting for access-control realm; sleep 2; done\"]}]}}}}"
              echo "Patching acs-backend with hostAlias and wait-for-keycloak..."
              kubectl patch deployment acs-backend -n {{ .Release.Namespace }} --patch "{\"spec\": {\"template\": {\"spec\": {\"hostAliases\": [{\"ip\": \"$IP\", \"hostnames\": [\"idp.localtest.me\"]}], \"initContainers\": [{\"name\": \"wait-for-keycloak\", \"image\": \"curlimages/curl:latest\", \"command\": [\"/bin/sh\", \"-c\", \"until curl -s http://keycloak/realms/access-control/.well-known/openid-configuration | grep -q issuer; do echo waiting for access-control realm; sleep 2; done\"]}]}}}}"
              echo "Patching gravitino with hostAlias and wait-for-keycloak..."
              kubectl patch deployment gravitino -n {{ .Release.Namespace }} --patch "{\"spec\": {\"template\": {\"spec\": {\"hostAliases\": [{\"ip\": \"$IP\", \"hostnames\": [\"idp.localtest.me\"]}], \"initContainers\": [{\"name\": \"wait-for-keycloak\", \"image\": \"curlimages/curl:latest\", \"command\": [\"/bin/sh\", \"-c\", \"until curl -s http://keycloak/realms/access-control/.well-known/openid-configuration | grep -q issuer; do echo waiting for access-control realm; sleep 2; done\"]}]}}}}"
              echo "Patching unity-catalog-server with hostAlias and wait-for-keycloak..."
              kubectl patch deployment unity-catalog-server -n {{ .Release.Namespace }} --patch "{\"spec\": {\"template\": {\"spec\": {\"hostAliases\": [{\"ip\": \"$IP\", \"hostnames\": [\"idp.localtest.me\"]}], \"initContainers\": [{\"name\": \"wait-for-keycloak\", \"image\": \"curlimages/curl:latest\", \"command\": [\"/bin/sh\", \"-c\", \"until curl -s http://keycloak/realms/access-control/.well-known/openid-configuration | grep -q issuer; do echo waiting for access-control realm; sleep 2; done\"]}]}}}}"
              echo "Patching polaris with hostAlias and wait-for-keycloak..."
              kubectl patch deployment polaris -n {{ .Release.Namespace }} --patch "{\"spec\": {\"template\": {\"spec\": {\"hostAliases\": [{\"ip\": \"$IP\", \"hostnames\": [\"idp.localtest.me\"]}], \"initContainers\": [{\"name\": \"wait-for-keycloak\", \"image\": \"curlimages/curl:latest\", \"command\": [\"/bin/sh\", \"-c\", \"until curl -s http://keycloak/realms/access-control/.well-known/openid-configuration | grep -q issuer; do echo waiting for access-control realm; sleep 2; done\"]}]}}}}"
              echo "Patching unity-catalog-ui with hostAlias..."
              kubectl patch deployment unity-catalog-ui -n {{ .Release.Namespace }} --patch "{\"spec\": {\"template\": {\"spec\": {\"hostAliases\": [{\"ip\": \"$IP\", \"hostnames\": [\"idp.localtest.me\"]}]}}}}"
      restartPolicy: OnFailure
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: infra-patch-sa
  namespace: {{ .Release.Namespace }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: infra-patch-cluster-role
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "patch"]
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["get", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: infra-patch-cluster-rb
subjects:
  - kind: ServiceAccount
    name: infra-patch-sa
    namespace: {{ .Release.Namespace }}
roleRef:
  kind: ClusterRole
  name: infra-patch-cluster-role
  apiGroup: rbac.authorization.k8s.io
