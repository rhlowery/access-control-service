{{- if .Values.keycloak.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: keycloak
  namespace: {{ .Release.Namespace }}
  labels:
    app: keycloak
spec:
  replicas: 1
  selector:
    matchLabels:
      app: keycloak
  template:
    metadata:
      labels:
        app: keycloak
    spec:
      containers:
        - name: keycloak
          image: "{{ .Values.keycloak.image.repository }}:{{ .Values.keycloak.image.tag }}"
          imagePullPolicy: {{ .Values.keycloak.image.pullPolicy }}
          command: ["/opt/keycloak/bin/kc.sh", "start-dev", "--http-relative-path=/", "--cache=local", "--health-enabled=true"]
          env:
            - name: KC_HEALTH_ENABLED
              value: "true"
            - name: KC_DB
              value: {{ .Values.keycloak.db.vendor | quote }}
            - name: KC_DB_URL
              value: "jdbc:postgresql://{{ .Values.keycloak.db.host }}:5432/{{ .Values.keycloak.db.database }}"
            - name: KC_DB_USERNAME
              value: {{ .Values.keycloak.db.username | quote }}
            - name: KC_DB_PASSWORD
              value: {{ .Values.keycloak.db.password | quote }}
            - name: KEYCLOAK_ADMIN
              value: {{ .Values.keycloak.adminUser | quote }}
            - name: KEYCLOAK_ADMIN_PASSWORD
              value: {{ .Values.keycloak.adminPassword | quote }}
            - name: KC_HTTP_ENABLED
              value: "true"
            - name: KC_HOSTNAME_STRICT
              value: "false"
            - name: KC_PROXY_HEADERS
              value: "xforwarded"
          ports:
            - name: http
              containerPort: 8080
            - name: management
              containerPort: 9000
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 9000
            initialDelaySeconds: 30
            periodSeconds: 10
          resources:
            {{- toYaml .Values.keycloak.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: keycloak
  namespace: {{ .Release.Namespace }}
spec:
  ports:
    - port: 80
      targetPort: 8080
      protocol: TCP
      name: http
    - port: 9000
      targetPort: 9000
      protocol: TCP
      name: management
  selector:
    app: keycloak
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: keycloak
  namespace: {{ .Release.Namespace }}
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
    nginx.ingress.kubernetes.io/proxy-buffer-size: "128k"
spec:
  ingressClassName: {{ .Values.keycloak.ingress.className | quote }}
  rules:
    - host: {{ .Values.keycloak.ingress.host | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: keycloak
                port:
                  number: 80
  {{- if .Values.keycloak.ingress.tls.enabled }}
  tls:
    - hosts:
        - {{ .Values.keycloak.ingress.host | quote }}
      secretName: {{ .Values.keycloak.ingress.tls.secretName | quote }}
  {{- end }}
{{- end }}
