# Default values for access-control-service library chart.
# This is a YAML-formatted file.

global:
  security:
    allowInsecureImages: true

acs-backend:
  fullnameOverride: "acs-backend"
  enabled: true
  image:
    repository: rhlowery/acs-backend
    tag: "1.0.0-SNAPSHOT"
    pullPolicy: IfNotPresent
  # Override acs-backend values
  security:
    publicKeyBase64: ""
    privateKeyBase64: ""
  appConfig:
    databricksUrl: "http://unity-catalog-server:8080"
    otelEndpoint: "http://otel-collector:4317"
    environment: "dev"
  # Use file: protocol for key locations to avoid MalformedURLException
  env:
    SMALLRYE_JWT_SIGN_KEY_LOCATION: "file:/deployments/keys/privateKey.pem"
    MP_JWT_VERIFY_PUBLICKEY_LOCATION: "file:/deployments/keys/publicKey.pem"
  readinessProbe:
    initialDelaySeconds: 60
    periodSeconds: 10
  livenessProbe:
    initialDelaySeconds: 90
    periodSeconds: 20
  service:
    type: ClusterIP
    nodePort: null
  ingress:
    enabled: true
    className: "nginx"
    annotations:
      cert-manager.io/cluster-issuer: "selfsigned-issuer"
    hosts:
      - host: api.localtest.me
        paths:
          - path: /
            pathType: Prefix
    tls:
      - secretName: api-sslip-tls
        hosts:
          - api.localtest.me

acs-ui:
  fullnameOverride: "acs-ui"
  enabled: true
  image:
    repository: rhlowery/acs-ui
    tag: "1.0.0-SNAPSHOT"
    pullPolicy: IfNotPresent
  # Link to the acs-backend service using the ingress hostname
  config:
    apiUrl: "http://api.localtest.me"
  ingress:
    enabled: true
    className: "nginx"
    annotations:
      cert-manager.io/cluster-issuer: "selfsigned-issuer"
    hosts:
      - host: acs.localtest.me
        paths:
          - path: /
            pathType: Prefix
    tls:
      - secretName: acs-sslip-tls
        hosts:
          - acs.localtest.me

ingress-nginx:
  enabled: false
  controller:
    replicaCount: 1
    admissionWebhooks:
      enabled: false


keycloak:
  enabled: true
  image:
    registry: quay.io
    repository: keycloak/keycloak
    tag: 25.0.1
  command: ["/opt/keycloak/bin/kc.sh"]
  args: ["start-dev", "--http-relative-path=/", "--cache=local"]
  postgresql:
    enabled: false
  fullnameOverride: "keycloak"
  externalDatabase:
    host: postgresql
    user: access_control_user
    password: user_password
    database: access_control_db
  extraEnvVars:
    - name: KC_CACHE
      value: "local"
    - name: KC_CACHE_STACK
      value: ""
    - name: KC_DB
      value: "postgres"
    - name: KC_DB_URL
      value: "jdbc:postgresql://postgresql:5432/access_control_db"
    - name: KC_DB_USERNAME
      value: "access_control_user"
    - name: KC_DB_PASSWORD
      value: "user_password"
    - name: KC_DB_SCHEMA
      value: "public"
    - name: KC_HOSTNAME_STRICT
      value: "false"
    - name: KC_HTTP_ENABLED
      value: "true"
    - name: KC_PROXY
      value: "edge"
    - name: KC_BOOTSTRAP_ADMIN_USERNAME
      value: "admin"
    - name: KC_BOOTSTRAP_ADMIN_PASSWORD
      value: "admin"
    - name: KEYCLOAK_ADMIN
      value: "admin"
    - name: KEYCLOAK_ADMIN_PASSWORD
      value: "admin"
    - name: PROXY_ADDRESS_FORWARDING
      value: "true"
    - name: KC_HOSTNAME
      value: "idp.localtest.me"
    - name: KC_PROXY_HEADERS
      value: "xforwarded"
  readinessProbe:
    initialDelaySeconds: 60
  livenessProbe:
    initialDelaySeconds: 90
  containerSecurityContext:
    enabled: true
    readOnlyRootFilesystem: false
    runAsUser: 1000
    runAsGroup: 0
  podSecurityContext:
    enabled: true
    fsGroup: 1000
  defaultInitContainers:
    prepareWriteDirs:
      enabled: false
  auth:
    adminUser: admin
    adminPassword: admin
  ingress:
    enabled: true
    ingressClassName: "nginx"
    hostname: idp.localtest.me
    path: /
    pathType: Prefix
    annotations:
      cert-manager.io/cluster-issuer: acs-ca-issuer
      nginx.ingress.kubernetes.io/proxy-buffer-size: "128k"
    tls: true

postgresql:
  enabled: true
  fullnameOverride: "postgresql"
  primary:
    readinessProbe:
      initialDelaySeconds: 30
  image:
    tag: latest
  auth:
    postgresPassword: admin_password
    username: access_control_user
    password: user_password
    database: access_control_db

gravitino:
  fullnameOverride: "gravitino"
  enabled: true
  mysql:
    enabled: false
  postgresql:
    enabled: false
  image:
    registry: docker.io
    repository: apache/gravitino
    tag: "latest"
  oidc:
    issuerUrl: "http://idp.localtest.me/realms/access-control"
    clientId: "gravitino-client"
  database:
    host: "postgresql"
    port: 5432
    database: "access_control_db"
    user: "access_control_user"
    password: "user_password"
  storage:
    type: "s3"
    s3:
      endpoint: "http://minio:9000"
      bucket: "gravitino-warehouse"
      accessKey: "minioadmin"
      secretKey: "minioadmin"
  ingress:
    enabled: true
    className: "nginx"
    hosts:
      - host: gravitino.localtest.me
        paths:
          - path: /
            pathType: Prefix

polaris:
  enabled: true
  auth:
    type: "oidc"
    oidcIssuerUrl: "http://idp.localtest.me/realms/access-control"
  fullnameOverride: "polaris"
  database:
    url: "jdbc:postgresql://postgresql:5432/access_control_db"
    username: "access_control_user"
    password: "user_password"
  ingress:
    enabled: true
    className: "nginx"
    hosts:
      - host: polaris.localtest.me
        paths:
          - path: /
            pathType: Prefix

unity-catalog:
  enabled: true
  fullnameOverride: "unity-catalog"
  postgresql:
    enabled: false
  auth:
    oidc:
      issuerUri: "http://idp.localtest.me/realms/access-control"
  server:
    db:
      type: "postgresql"
    postgresqlConfig:
      host: "postgresql"
      dbName: "access_control_db"
      username: "access_control_user"
  storage:
    type: "s3"
    s3:
      endpoint: "http://minio:9000"
      bucket: "unity-catalog"
      accessKey: "minioadmin"
      secretKey: "minioadmin"
  ingress:
    enabled: true
    ingressClassName: "nginx"
    host: unity.localtest.me

hive-metastore:
  enabled: true
  fullnameOverride: "hive-metastore"
  postgresql:
    enabled: false
    fullnameOverride: "hive-metastore-postgresql"
    image:
      registry: docker.io
      repository: bitnami/postgresql
      tag: latest
    auth:
      username: hive
      password: hive
      database: metastore
  auth:
    oidc:
      issuerUrl: "http://idp.localtest.me/realms/access-control"
  connections:
    database:
      type: "postgres"
      host: "postgresql"
      database: "access_control_db"
      username: "access_control_user"
      password: "user_password"
  storage:
    type: "s3"
    s3:
      endpoint: "http://minio:9000"
      bucket: "hive-warehouse"
      accessKey: "minioadmin"
      secretKey: "minioadmin"
  ingress:
    enabled: true
    className: "nginx"
    hosts:
      - host: hive.localtest.me
        paths:
          - path: /
            pathType: Prefix

minio:
  enabled: true
  fullnameOverride: "minio"
  mode: standalone
  replicas: 1
  persistence:
    enabled: false
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi
  auth:
    rootUser: minioadmin
    rootPassword: minioadmin
  # Configuration for local object storage
  defaultBuckets: "access-control, hive-warehouse, gravitino-warehouse, unity-catalog"
  ingress:
    enabled: true
    ingressClassName: "nginx"
    hosts:
      - s3.localtest.me
    consoleIngress:
      enabled: true
      ingressClassName: "nginx"
      hosts:
        - console.s3.localtest.me

cert-manager:
  enabled: true
  installCRDs: true
  # Uncomment below to setup a default cluster issuer for self-signed certificates
  clusterIssuer:
    enabled: true
    name: "selfsigned-issuer"

prometheus:
  enabled: true
  fullnameOverride: "prometheus"
  alertmanager:
    enabled: false
  prometheus-node-exporter:
    enabled: false
  prometheus-pushgateway:
    enabled: false
  server:
    fullnameOverride: "prometheus-server"
    persistentVolume:
      enabled: false
    # Enable remote write for Otel collector
    extraArgs:
      web.enable-remote-write-receiver: null

opentelemetry-collector:
  enabled: true
  fullnameOverride: "otel-collector"
  image:
    repository: otel/opentelemetry-collector-contrib
    tag: 0.113.0
  mode: deployment
  config:
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318
    exporters:
      prometheusremotewrite:
        endpoint: "http://prometheus-server/api/v1/write"
        resource_to_telemetry_conversion:
          enabled: true
    service:
      pipelines:
        metrics:
          receivers: [otlp]
          exporters: [prometheusremotewrite]
