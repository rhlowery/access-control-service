# Default values for access-control-service library chart.
# This is a YAML-formatted file.

acs-backend:
  enabled: true
  # Add overrides for acs-backend here

acs-ui:
  enabled: true
  # Link to the acs-backend service using the default service name pattern
  backendApiUrl: "http://access-control-service-acs-backend:8080"
  # Add other overrides for acs-ui here

ingress-nginx:
  enabled: false
  controller:
    replicaCount: 1
    # Other default configurations for the ingress controller can go here if needed

keycloak:
  enabled: false
  auth:
    adminUser: admin
    # In a real environment, provide a secure password or use an existing secret
    adminPassword: admin
  # Settings to simulate Azure AD can go here

postgresql:
  enabled: false
  auth:
    postgresPassword: admin_password
    username: access_control_user
    password: user_password
    database: access_control_db

gravitino:
  enabled: false
  # Uncomment below to link catalog with supporting services
