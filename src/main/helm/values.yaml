# Default values for access-control-service library chart.
# This is a YAML-formatted file.

acs-backend:
  enabled: true
  image:
    repository: acs-backend
    tag: "1.0.0-SNAPSHOT"
    pullPolicy: IfNotPresent
  ingress:
    enabled: true
    className: "nginx"
    hosts:
      - host: api.localnet
        paths:
          - path: /
            pathType: Prefix

acs-ui:
  enabled: true
  image:
    repository: acs-ui
    tag: "1.0.0-SNAPSHOT"
    pullPolicy: IfNotPresent
  # Link to the acs-backend service using the ingress hostname for external or service name for internal
  backendApiUrl: "http://api.localnet"
  ingress:
    enabled: true
    className: "nginx"
    hosts:
      - host: acs.localnet
        paths:
          - path: /
            pathType: Prefix

ingress-nginx:
  enabled: true
  controller:
    replicaCount: 1
    # Other default configurations for the ingress controller can go here if needed

keycloak:
  enabled: true
  auth:
    adminUser: admin
    adminPassword: admin
  ingress:
    enabled: true
    className: "nginx"
    hosts:
      - host: idp.localnet
        paths:
          - path: /
            pathType: Prefix

postgresql:
  enabled: true
  auth:
    postgresPassword: admin_password
    username: access_control_user
    password: user_password
    database: access_control_db

gravitino:
  enabled: true
  oidc:
    issuerUrl: "http://idp.localnet/realms/access-control"
    clientId: "gravitino-client"
  database:
    host: "access-control-service-postgresql"
    port: 5432
    database: "access_control_db"
    user: "access_control_user"
    password: "user_password"
  storage:
    type: "s3"
    s3:
      endpoint: "http://access-control-service-minio:9000"
      bucket: "gravitino-warehouse"
      accessKey: "minioadmin"
      secretKey: "minioadmin"
  ingress:
    enabled: true
    className: "nginx"
    hosts:
      - host: gravitino.localnet
        paths:
          - path: /
            pathType: Prefix

polaris:
  enabled: true
  auth:
    type: "oidc"
    oidcIssuerUrl: "http://idp.localnet/realms/access-control"
  database:
    url: "jdbc:postgresql://access-control-service-postgresql:5432/access_control_db"
    username: "access_control_user"
    password: "user_password"
  ingress:
    enabled: true
    className: "nginx"
    hosts:
      - host: polaris.localnet
        paths:
          - path: /
            pathType: Prefix

unity-catalog:
  enabled: true
  auth:
    oidc:
      issuerUri: "http://idp.localnet/realms/access-control"
  database:
    host: "access-control-service-postgresql"
    database: "access_control_db"
    user: "access_control_user"
    password: "user_password"
  storage:
    type: "s3"
    s3:
      endpoint: "http://access-control-service-minio:9000"
      bucket: "unity-catalog"
      accessKey: "minioadmin"
      secretKey: "minioadmin"
  ingress:
    enabled: true
    className: "nginx"
    hosts:
      - host: unity.localnet
        paths:
          - path: /
            pathType: Prefix

hive-metastore:
  enabled: true
  auth:
    oidc:
      issuerUrl: "http://idp.localnet/realms/access-control"
  database:
    type: "postgres"
    host: "access-control-service-postgresql"
    database: "access_control_db"
    user: "access_control_user"
    password: "user_password"
  storage:
    type: "s3"
    s3:
      endpoint: "http://access-control-service-minio:9000"
      bucket: "hive-warehouse"
      accessKey: "minioadmin"
      secretKey: "minioadmin"
  ingress:
    enabled: true
    className: "nginx"
    hosts:
      - host: hive.localnet
        paths:
          - path: /
            pathType: Prefix

minio:
  enabled: false
  auth:
    rootUser: minioadmin
    rootPassword: minioadmin
  # Configuration for local object storage
  defaultBuckets: "access-control, hive-warehouse, gravitino-warehouse, unity-catalog"
  ingress:
    enabled: true
    ingressClassName: "nginx"
    hosts:
      - s3.localnet
    consoleIngress:
      enabled: true
      ingressClassName: "nginx"
      hosts:
        - console.s3.localnet

cert-manager:
  enabled: true
  installCRDs: true
  # Uncomment below to setup a default cluster issuer for self-signed certificates
  clusterIssuer:
    enabled: true
    name: "selfsigned-issuer"
