apiVersion: v2
name: access-control-service
description: A Helm library chart for Access Control Service
type: library
version: 1.0.0
appVersion: "1.0.0"

dependencies:
  - name: ingress-nginx
    version: 4.10.0
    repository: https://kubernetes.github.io/ingress-nginx
    condition: ingress-nginx.enabled
  - name: keycloak
    version: 21.1.2
    repository: https://charts.bitnami.com/bitnami
    condition: keycloak.enabled
  - name: postgresql
    version: 12.5.1
    repository: https://charts.bitnami.com/bitnami
    condition: postgresql.enabled
  - name: gravitino
    version: 1.3.0
    repository: "file://../../../../../apache/gravitino/dev/charts/gravitino"
    condition: gravitino.enabled
  - name: polaris
    version: 1.3.0-incubating
    repository: https://downloads.apache.org/incubator/polaris/helm-chart/
    condition: polaris.enabled
  - name: ilum-unity-catalog
    alias: unity-catalog
    version: 0.1.0
    repository: https://charts.ilum.cloud
    condition: unity-catalog.enabled
  - name: hive-metastore
    version: 0.2.0
    repository: https://hevaweb.github.io/heva-helm-charts/
    condition: hive-metastore.enabled
  - name: cert-manager
    version: 1.14.4
    repository: https://charts.jetstack.io
    condition: cert-manager.enabled
  - name: acs-backend
    version: 0.1.0
    repository: "file://../../../../acs-backend/src/main/helm/acs-backend"
    condition: acs-backend.enabled
  - name: frontend
    alias: acs-ui
    version: 0.1.0
    repository: "file://../../../../acs-ui/frontend/helm/frontend"
    condition: acs-ui.enabled
  - name: minio
    version: 5.4.0
    repository: https://charts.min.io/
    condition: minio.enabled
