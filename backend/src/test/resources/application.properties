# Test Overrides
quarkus.otel.enabled=false
quarkus.otel.exporter.otlp.endpoint=http://localhost:4317

# JWT Configuration (Standard MP-JWT)
mp.jwt.verify.publickey.location=classpath:publicKey.pem
smallrye.jwt.sign.key.location=classpath:privateKey.pem
mp.jwt.verify.issuer=unity-catalog-acs-bff
mp.jwt.token.cookie=bff_jwt

# Explicitly set paths for consistency with main profile
quarkus.micrometer.export.prometheus.path=/metrics
quarkus.smallrye-health.root-path=/health
quarkus.smallrye-openapi.path=/openapi

# Enable proactive authentication
quarkus.http.auth.proactive=true

# Security debug
quarkus.log.category."io.smallrye.jwt".level=DEBUG
quarkus.log.category."com.rhlowery.acs".level=DEBUG
quarkus.log.category."io.quarkus.security".level=DEBUG

# Database for Testing (In-memory H2)
quarkus.datasource.db-kind=h2
quarkus.datasource.jdbc.url=jdbc:h2:mem:test;DB_CLOSE_DELAY=-1
quarkus.datasource.username=sa
quarkus.datasource.password=sa

# Hibernate / Panache for testing
quarkus.hibernate-orm.database.generation=drop-and-create
quarkus.hibernate-orm.log.sql=false

# Disable OIDC for basic coverage tests (Mock IdP used instead)
quarkus.oidc-client.enabled=false
quarkus.oidc.enabled=false
