apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "acs-backend.fullname" . }}
  labels:
    {{- include "acs-backend.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "acs-backend.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "acs-backend.labels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "acs-backend.serviceAccountName" . }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- if .Values.postgresql.waitOnStart }}
      initContainers:
        - name: wait-for-postgresql
          image: {{ .Values.postgresql.image | quote }}
          command:
            - /bin/sh
            - -c
            - |-
              echo "Waiting for PostgreSQL ({{ .Values.global.postgresql.host | default .Values.postgresql.host }}:5432) to be ready..."
              until nc -zv {{ .Values.global.postgresql.host | default .Values.postgresql.host }} 5432; do
                echo "PostgreSQL is not ready yet, sleeping..."
                sleep 2
              done
              echo "PostgreSQL is ready!"
{{- end }}

      containers:
        - name: {{ .Chart.Name }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "acs-backend.fullname" . }}-config
          env:
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "acs-backend.fullname" . }}-auth
                  key: db-password
            - name: OIDC_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "acs-backend.fullname" . }}-auth
                  key: oidc-secret
            {{- if .Values.security.pemKeysEnabled }}
            - name: SMALLRYE_JWT_SIGN_KEY_LOCATION
              value: "file:/deployments/keys/privateKey.pem"
            - name: MP_JWT_VERIFY_PUBLICKEY_LOCATION
              value: "file:/deployments/keys/publicKey.pem"
            {{- end }}

          {{- with .Values.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            {{- if .Values.security.pemKeysEnabled }}
            - name: jwt-keys
              mountPath: "/deployments/keys"
              readOnly: true
            {{- end }}

          {{- with .Values.volumeMounts }}
            {{- toYaml . | nindent 12 }}
          {{- end }}
      volumes:
        {{- if .Values.security.pemKeysEnabled }}
        - name: jwt-keys
          secret:
            secretName: {{ include "acs-backend.fullname" . }}-keys
        {{- end }}

      {{- with .Values.volumes }}
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
