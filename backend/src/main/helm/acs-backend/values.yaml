# Default values for acs-backend.
# global allows for shared configuration across multiple charts in a parent-subchart relationship.
global:
  postgresql: {}
  oidc: {}
  image: {}

# replicaCount defines the number of persistent pod instances to run.
# Increasing this to 2 to take advantage of the 4-node KIND cluster.
replicaCount: 2

# image configuration for the acs-backend container.
image:
  # repository should point to your container registry (e.g. docker.io/myuser/acs-backend)
  repository: rhlowery/acs-backend
  # pullPolicy determines if the image is downloaded every time the pod starts.
  pullPolicy: Always
  # tag overrides the image version. If left empty, it defaults to the AppVersion in Chart.yaml.
  tag: "latest"

# This is for the secrets for pulling an image from a private repository more information can be found here: https://kubernetes.io/docs/tasks/configure-pod-container/pull-image-private-registry/
imagePullSecrets: []
# This is to override the chart name.
nameOverride: ""
fullnameOverride: ""

# This section builds out the service account more information can be found here: https://kubernetes.io/docs/concepts/security/service-accounts/
serviceAccount:
  # Specifies whether a service account should be created.
  create: true
  # Automatically mount a ServiceAccount's API credentials?
  automount: true
  # Annotations to add to the service account.
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template.
  name: ""

# This is for setting Kubernetes Annotations to a Pod.
# For more information checkout: https://kubernetes.io/docs/concepts/overview/working-with-objects/annotations/
podAnnotations: {}
# This is for setting Kubernetes Labels to a Pod.
# For more information checkout: https://kubernetes.io/docs/concepts/overview/working-with-objects/labels/
podLabels: {}

podSecurityContext: {}
  # fsGroup: 2000

securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

# service configuration for exposing the acs-backend within the cluster.
service:
  # type determines how the service is exposed (ClusterIP, NodePort, LoadBalancer).
  # Use NodePort to easily access the service from your host machine on KIND.
  type: NodePort
  # port is the port the service listens on. Set to 8080 to match the Quarkus default.
  port: 8080
  # nodePort (optional) for the NodePort service.
  nodePort: 30080

# This block is for setting up the ingress for more information can be found here: https://kubernetes.io/docs/concepts/services-networking/ingress/
ingress:
  enabled: false
  className: ""
  annotations: {}
    # cert-manager.io/cluster-issuer: letsencrypt-prod
    # cert-manager.io/issuer: my-issuer
  certManager:
    # Use cert-manager to automatically provide TLS certificates.
    # If set to true, it will automatically add the relevant annotations to the Ingress.
    enabled: false
    # issuerRef defines which cert-manager (Cluster)Issuer to use.
    issuerRef:
      name: ""
      kind: ClusterIssuer # or Issuer
  hosts:
    - host: chart-example.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []
    # - secretName: chart-example-tls
    #   hosts:
    #     - chart-example.local

# -- Expose the service via gateway-api HTTPRoute
# Requires Gateway API resources and suitable controller installed within the cluster
# (see: https://gateway-api.sigs.k8s.io/guides/)
httpRoute:
  # HTTPRoute enabled.
  enabled: false
  # HTTPRoute annotations.
  annotations: {}
  # Which Gateways this Route is attached to.
  parentRefs:
    - name: gateway
      sectionName: http
      # namespace: default
  # Hostnames matching HTTP header.
  hostnames:
    - chart-example.local
  # List of rules and filters applied.
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /headers
  #   filters:
  #   - type: RequestHeaderModifier
  #     requestHeaderModifier:
  #       set:
  #       - name: My-Overwrite-Header
  #         value: this-is-the-only-value
  #       remove:
  #       - User-Agent
  # - matches:
  #   - path:
  #       type: PathPrefix
  #       value: /echo
  #     headers:
  #     - name: version
  #       value: v2

resources:
  # Added resource requests to ensure stable scheduling on KIND nodes.
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

# Database connectivity options.
# Set waitOnStart to true if the app depends on a running PostgreSQL instance.
postgresql:
  waitOnStart: false
  # Hostname of the PostgreSQL service.
  # Hostname of the PostgreSQL service. Preferred: host: "postgresql-rw"
  host: ""
  # Database name, username, and password for the acs-backend
  database: ""
  username: "acs"
  password: "acs"
  # Lightweight image to use for the check.
  image: "busybox:1.36"

# -- OIDC configuration for the 3rd-party identity provider.
# Requires a running OIDC server (e.g. Keycloak, Auth0, Okta).
oidc:
  # The base URL of the OIDC server.
  authServerUrl: ""
  # The client identifier issued by the OIDC server.
  clientId: "acs-backend"
  # The client secret issued by the OIDC server.
  clientSecret: "REPLACE_ME_SECRET"
  # Whether to use service discovery to fetch OIDC configuration.
  discoveryEnabled: true

  # We usually recommend not to specify default resources and to leave this as a conscious
  # choice for the user. This also increases chances charts run on environments with little
  # resources, such as Minikube. If you do want to specify resources, uncomment the following
  # lines, adjust them as necessary, and remove the curly braces after 'resources:'.
  # limits:
  #   cpu: 100m
  #   memory: 128Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi

# livenessProbe and readinessProbe ensure the application is healthy and ready to receive traffic.
# These use the /health endpoint provided by the Quarkus SmallRye Health extension.
livenessProbe:
  httpGet:
    path: /health
    port: http
readinessProbe:
  httpGet:
    path: /health
    port: http

# This section is for setting up autoscaling more information can be found here: https://kubernetes.io/docs/concepts/workloads/autoscaling/
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

# Additional volumes on the output Deployment definition.
volumes: []
  # - name: foo
  #   secret:
  #     secretName: mysecret
  #     optional: false

# Additional volumeMounts on the output Deployment definition.
volumeMounts: []
  # - name: foo
  #   mountPath: "/etc/foo"
  #   readOnly: true

nodeSelector: {}

tolerations: []

affinity: {}

# appConfig contains application-specific settings that override defaults in application.properties.
appConfig:
  # databricksUrl to point to your specific Databricks instance.
  databricksUrl: "https://databricks-instance.com"
  # otelEndpoint for OpenTelemetry tracing. Should point to your OTel collector.
  otelEndpoint: "http://otel-collector:4317"
  # environment name used for resource tagging and conditional logic.
  environment: "development"

# security contains sensitive credentials and keys.
security:
  # pemKeysEnabled determines if the application should use mounted PEM files.
  # If false, it will use the default keys bundled in the image.
  pemKeysEnabled: false
  # PEM files for JWT verification and signing.
  # These must be provided as Base64 encoded strings.
  # Example command to generate: cat privateKey.pem | base64
  publicKeyBase64: ""
  privateKeyBase64: ""

