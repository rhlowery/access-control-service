# Quarkus Configuration
quarkus.http.port=8080
quarkus.http.host=0.0.0.0
# Security / CORS
quarkus.http.cors=true
quarkus.http.cors.origins=*
quarkus.http.cors.methods=GET,POST,PUT,DELETE,OPTIONS
quarkus.http.cors.headers=Content-Type,Authorization,X-Requested-With,Accept,Origin
quarkus.http.cors.exposed-headers=Set-Cookie

# Security
# Sign with custom BFF issuer
smallrye.jwt.sign.key.location=${SMALLRYE_JWT_SIGN_KEY_LOCATION:privateKey.pem}
smallrye.jwt.always-check-authorization=false

# OIDC Verification (Dynamic JWKS from discovery)
quarkus.oidc.auth-server-url=${OIDC_AUTH_SERVER_URL}
quarkus.oidc.client-id=${OIDC_CLIENT_ID}
quarkus.oidc.application-type=service
quarkus.oidc.discovery-enabled=true

# SmallRye JWT Verification (Legacy BFF/Test Support)
mp.jwt.verify.issuer=unity-catalog-acs-bff
mp.jwt.verify.publickey.location=publicKey.pem
mp.jwt.token.cookie=bff_jwt

# REST Client
databricks-api/mp-rest/url=${DATABRICKS_API_MP_REST_URL:https://databricks-instance.com}

# HATEOAS
# quarkus.hal.json.enabled=true (Automatically enabled by the quarkus-hal extension)

# Health
quarkus.smallrye-health.root-path=/health

# Metrics
quarkus.micrometer.export.prometheus.path=/metrics

# OpenAPI
quarkus.smallrye-openapi.path=/openapi
quarkus.swagger-ui.always-include=true
mp.openapi.extensions.smallrye.info.title=ACS Backend API
mp.openapi.extensions.smallrye.info.version=1.0.0

# OpenTelemetry
quarkus.otel.enabled=true
quarkus.otel.exporter.otlp.endpoint=${QUARKUS_OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4317}
quarkus.otel.service.name=acs-backend
quarkus.otel.resource.attributes=${QUARKUS_OTEL_RESOURCE_ATTRIBUTES:deployment.environment=development}

# Database Configuration (Persisting Persona Mappings)
quarkus.datasource.db-kind=postgresql
%prod.quarkus.datasource.jdbc.url=${DB_URL}
%prod.quarkus.datasource.username=${DB_USERNAME}
%prod.quarkus.datasource.password=${DB_PASSWORD}

# Hibernate / Panache
quarkus.hibernate-orm.database.generation=update
quarkus.hibernate-orm.log.sql=false

# OIDC Client Configuration (Pluggable IdP)
%prod.quarkus.oidc-client.auth-server-url=${OIDC_AUTH_SERVER_URL}
%prod.quarkus.oidc-client.client-id=${OIDC_CLIENT_ID}
%prod.quarkus.oidc-client.credentials.secret=${OIDC_CLIENT_SECRET}
%prod.quarkus.oidc-client.discovery-enabled=true

# In dev/test mode, disable the OIDC client entirely (mock IdP is used instead)
%dev.quarkus.oidc-client.enabled=false
%dev.quarkus.oidc.enabled=false
%test.quarkus.oidc.enabled=false
